category: chair
data_root: data/ModelNet40
split: train
num_points: 1024
timesteps: 1000
beta_schedule: cosine

# Point-E PointDiffusionTransformer (384w/8L)
denoiser_type: transformer
hidden_dim: 384
num_layers: 8
num_heads: 8
init_scale: 0.25
time_token_cond: true
input_channels: 3
output_channels: 3

batch_size: 16
epochs: 1000
lr: 0.0001
weight_decay: 0.01
num_workers: 0
pin_memory: true
preload_data: true
use_amp: true
tf32: true
cudnn_benchmark: true
save_dir: checkpoints_chair
save_every: 50
device: cuda
