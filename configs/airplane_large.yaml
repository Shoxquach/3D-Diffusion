category: airplane
data_root: data/ModelNet40
split: train
num_points: 1024
timesteps: 1000
beta_schedule: cosine

# Point-E PointDiffusionTransformer (compact: 256w/6L, ~5M params)
denoiser_type: transformer
hidden_dim: 512
num_layers: 12
num_heads: 8
init_scale: 0.25
time_token_cond: true
input_channels: 3
output_channels: 3

batch_size: 2
grad_accum_steps: 16
epochs: 1000
lr: 0.0001
weight_decay: 0.05
num_workers: 0
pin_memory: true
preload_data: true
use_amp: true
tf32: true
cudnn_benchmark: false  # avoid autotune memory spikes on large sequences
save_dir: checkpoints2
save_every: 25
device: cuda
